name: Publish CLI

on:
  workflow_dispatch:
  release:
    types:
      - published

concurrency:
  group: publish-create-bight
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: npm install -g npm@^11.10.0
      - run: npm --version
      - run: pnpm install --frozen-lockfile
      - run: node scripts/ensure-unpublished-version.mjs
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm smoke:cli
      - run: mkdir -p .artifacts/packs
      - run: pnpm pack --pack-destination ../../.artifacts/packs
        working-directory: packages/create-bight
      - uses: actions/upload-artifact@v4
        with:
          name: create-bight-pack
          path: .artifacts/packs
          if-no-files-found: error
      - run: npm publish --access public --provenance
        working-directory: packages/create-bight
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
