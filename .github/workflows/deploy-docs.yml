name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - packages/docs/**
      - .github/workflows/deploy-docs.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter bight-ts-docs build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://bight-ts.github.io' }}
          BASE_PATH: ${{ vars.BASE_PATH || '/bight-ts-tooling/' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/docs/dist

      - id: deployment
        uses: actions/deploy-pages@v4
